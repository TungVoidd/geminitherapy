<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; cursor: none; }
  html, body { overflow: hidden; background: transparent; width: 100%; height: 100%; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>

// ══════════════════════════════════════════════════════════════════════════════
//  GEMINI THERAPY SETTINGS
// ══════════════════════════════════════════════════════════════════════════════
const S = {
  particleCount: 45,
  particleLife: 1200, // ms
  gravity: 0.15,
  friction: 0.98,
  wandWidth: 6,
  wandHeight: 60,
  bgAlpha: 0.011,
};

const CHIME_SOUNDS = ['sounds/A.mp3', 'sounds/B.mp3', 'sounds/C.mp3', 'sounds/D.mp3', 'sounds/E.mp3'];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let particles = [];
let lastActivationTime = 0;
let showWand = true;

// ── Particle System ────────────────────────────────────────────────────────
class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.size = Math.random() * 4 + 2;
    this.life = S.particleLife;
    this.maxLife = S.particleLife;
    this.color = `hsla(${Math.random() < 0.5 ? 45 : 200}, 100%, 70%, `; // Gold or soft blue
  }

  update(dt) {
    this.vx *= S.friction;
    this.vy *= S.friction;
    this.vy += S.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= dt;
  }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = this.color + alpha + ')';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    
    // Tiny glow
    ctx.shadowBlur = 10;
    ctx.shadowColor = ctx.fillStyle;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnSparkles(x, y) {
  for (let i = 0; i < S.particleCount; i++) {
    particles.push(new Particle(x, y));
  }
}

function playChimeSound() {
  if (!CHIME_SOUNDS.length) return;
  const src = CHIME_SOUNDS[Math.floor(Math.random() * CHIME_SOUNDS.length)];
  const a = new Audio(src);
  a.play().catch(() => {});
}

document.addEventListener('mousemove', e => { 
  mouseX = e.clientX; 
  mouseY = e.clientY; 
});

document.addEventListener('mousedown', e => {
  if (e.button === 0) { // Left click
    spawnSparkles(mouseX, mouseY - S.wandHeight);
    playChimeSound();
    window.bridge.whipCrack(); // Keep original bridge name for compatibility
  } else if (e.button === 2) { // Right click
    showWand = false;
    window.bridge.hideOverlay();
  }
});

// Disable context menu so right-click works smoothly
window.addEventListener('contextmenu', e => e.preventDefault());

// ── Main loop ──────────────────────────────────────────────────────────────
let lastTime = performance.now();

function update(now) {
  const dt = now - lastTime;
  lastTime = now;

  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => p.update(dt));
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background capture
  ctx.fillStyle = `rgba(0,0,0,${S.bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // Draw Particles
  particles.forEach(p => p.draw(ctx));

  // Draw Wand
  if (showWand) {
    const wandTopX = mouseX;
    const wandTopY = mouseY - S.wandHeight;
    
    // Movement tilt
    const dx = mouseX - prevMouseX;
    const tilt = Math.max(-0.2, Math.min(0.2, dx * 0.05));

    ctx.save();
    ctx.translate(mouseX, mouseY);
    ctx.rotate(tilt);
    
    // Wand body
    const grad = ctx.createLinearGradient(0, 0, 0, -S.wandHeight);
    grad.addColorStop(0, '#888');
    grad.addColorStop(0.5, '#eee');
    grad.addColorStop(1, '#fff');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-S.wandWidth/2, -S.wandHeight, S.wandWidth, S.wandHeight, 3);
    ctx.fill();

    // Wand Tip (Glow)
    const time = Date.now() * 0.005;
    const glow = 15 + Math.sin(time) * 5;
    
    ctx.shadowBlur = glow;
    ctx.shadowColor = '#ffd700'; // Gold glow
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -S.wandHeight, S.wandWidth + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  prevMouseX = mouseX;
  prevMouseY = mouseY;
}

function loop(now) {
  update(now);
  draw();
  requestAnimationFrame(loop);
}
loop(performance.now());

// ── IPC ──────────────────────────────────────────────────────────────────
window.bridge.onSpawnWhip(() => {
  showWand = true;
});

window.bridge.onDropWhip(() => {
  // Instead of dropping, we can just hide it or keep it
  // For therapy, maybe it just fades out?
  showWand = false;
  window.bridge.hideOverlay();
});

</script>
</body>
</html>
